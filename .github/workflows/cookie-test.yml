name: Auth Browser Test

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Chrome runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            fonts-liberation \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libatspi2.0-0 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0t64 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libvulkan1 \
            libx11-6 \
            libxcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            wget \
            xdg-utils

      - name: Install agent-browser + Chrome
        run: npx agent-browser install --with-deps

      - name: Start web server
        run: |
          set -euo pipefail

          mkdir -p logs
          echo "Starting Bun servers with 'bun run dev'..."
          bun run dev > logs/dev.log 2>&1 &
          echo $! > logs/dev.pid
          echo "bun run dev started with PID $(cat logs/dev.pid)"

      - name: Verify auth server responds on port 3000
        run: |
          set -euo pipefail

          for attempt in $(seq 1 20); do
            if curl -sf http://localhost:3000/get-session >/tmp/auth-server-check.json; then
              echo "Auth server responded on port 3000"
              cat /tmp/auth-server-check.json
              exit 0
            fi

            echo "Waiting for auth server on port 3000 (attempt ${attempt}/20)..."
            sleep 1
          done

          echo "Auth server did not respond on port 3000"
          echo "--- dev.log ---"
          cat logs/dev.log || true
          exit 1

      - name: Run auth browser test
        env:
          AGENT_BROWSER_ARGS: --no-sandbox,--disable-dev-shm-usage
        run: bun run-test.ts

      - name: Upload evidence
        if: ${{ always() }} 
        uses: actions/upload-artifact@v4
        with:
          name: auth-browser-test-evidence
          path: |
            evidence/
